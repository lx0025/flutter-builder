name: Build Flutter Project

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: true
      chat_id:
        description: 'Telegram Chat ID'
        required: true
      build_type:
        description: 'Build Type (apk/appbundle/web)'
        required: false
        default: 'apk'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Download project zip
        run: |
          mkdir -p projects
          cd projects
          BUILD_ID="${{ github.event.inputs.build_id }}"
          wget -O ${BUILD_ID}.zip "https://github.com/${{ github.repository }}/raw/main/projects/${BUILD_ID}.zip"
          unzip -o "${BUILD_ID}.zip" -d "${BUILD_ID}"
          
      - name: Build APK
        if: ${{ github.event.inputs.build_type == 'apk' || !github.event.inputs.build_type }}
        run: |
          BUILD_ID="${{ github.event.inputs.build_id }}"
          cd projects/${BUILD_ID}
          flutter clean
          flutter pub get
          flutter build apk --release
          
      - name: Upload APK
        if: ${{ github.event.inputs.build_type == 'apk' || !github.event.inputs.build_type }}
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: projects/${{ github.event.inputs.build_id }}/build/app/outputs/flutter-apk/app-release.apk
          
      - name: Send to Telegram
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ github.event.inputs.chat_id }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Build completed!
            Build ID: ${{ github.event.inputs.build_id }}
            Type: ${{ github.event.inputs.build_type }}
            Status: ${{ job.status }}
