name: Build Flutter Project

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: true
      chat_id:
        description: 'Telegram Chat ID'
        required: true
      build_type:
        description: 'Build Type'
        required: false
        default: 'apk'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Download project
        run: |
          mkdir -p projects
          cd projects
          BUILD_ID="${{ github.event.inputs.build_id }}"
          curl -L -o ${BUILD_ID}.zip "https://github.com/${{ github.repository }}/raw/main/projects/${BUILD_ID}.zip"
          unzip -o "${BUILD_ID}.zip" -d "${BUILD_ID}"
          ls -la
          
      - name: Build APK
        run: |
          BUILD_ID="${{ github.event.inputs.build_id }}"
          cd projects/${BUILD_ID}
          flutter clean
          flutter pub get
          flutter build apk --release
          
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: projects/${{ github.event.inputs.build_id }}/build/app/outputs/flutter-apk/app-release.apk
